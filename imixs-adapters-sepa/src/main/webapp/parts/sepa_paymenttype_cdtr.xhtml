<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html">


	<ui:fragment rendered="#{!readonly}">
		<h:panelGroup id="accountselector_id">
			<h:selectOneMenu required="#{required?validationController.required:false}"
				value="#{workitem.item[item.name]}" disabled="#{item.disabled}" style="width: 15em;">
				<c:forEach items="#{sepaController.cdtrList}" var="cdtr">
					<f:selectItem itemLabel="#{cdtr.item['name']}" itemValue="#{cdtr.item['name']}" />
				</c:forEach>
				<f:selectItem itemLabel="#{custom['payment.no_sepa']}" itemValue="no_sepa" />
				<f:selectItem itemLabel="#{custom['payment.direct_debit']}" itemValue="direct_debit" />
				<f:selectItem itemLabel="#{custom['payment.credit']}" itemValue="credit" />
			</h:selectOneMenu>

		</h:panelGroup>
	</ui:fragment>
	<ui:fragment rendered="#{readonly}">

		<c:choose>
			<c:when test="#{workitem.item[item.name] eq 'no_sepa'}">
				<h:outputText value="#{custom['payment.no_sepa']}" />
			</c:when>
			<c:when test="#{workitem.item[item.name] eq 'direct_debit'}">
				<h:outputText value="#{custom['payment.direct_debit']}" />
			</c:when>
			<c:when test="#{workitem.item[item.name] eq 'credit'}">
				<h:outputText value="#{custom['payment.credit']}" />
			</c:when>
			<c:otherwise>
				<h:outputText value="#{workitem.item[item.name]}" />
			</c:otherwise>
		</c:choose>
	</ui:fragment>

</ui:composition>
